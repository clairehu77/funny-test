<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#2a241d">
  <title>一本万利</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="view active intro" id="introView">
      <div class="hero" aria-labelledby="page-title">
        <div class="hero-content">
          <p class="eyebrow">江湖 · 信息差 · 老板人格</p>
          <h1 id="page-title">一本万利</h1>
          <p class="lead">鲛人、藏宝阁、合欢宗、五毒教、御兽宗都在找路子。你谁都不是，但谁都找得到你。</p>
          <div class="intro-actions">
            <button class="btn primary" id="startBtn" type="button">翻开账本</button>
          </div>
        </div>
      </div>
    </section>

    <section class="view screen" id="quizView">
      <section class="toolbar topbar" aria-label="答题进度">
        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="progressText">第 1 / 32 题</span>
            <span id="selectedText">未选择</span>
          </div>
          <div class="progress"><span id="progressBar"></span></div>
        </div>
      </section>

      <section class="question-stage">
        <section class="questions" id="questions" aria-label="测试题目"></section>
      </section>

      <nav class="pager" aria-label="题目翻页">
        <button class="btn primary next" id="nextBtn" type="button">下一题</button>
      </nav>
    </section>

    <section class="view screen" id="resultView">
      <section class="result show" id="result" aria-live="polite">
        <div class="result-inner">
          <div class="result-main">
            <div class="badge" id="resultType">普通结局</div>
            <h2 id="resultTitle"></h2>
            <p class="result-tag" id="resultTag"></p>
            <div class="rarity" aria-label="结局稀有程度">
              <div class="rarity-top">
                <span id="rarityLabel">稀有程度</span>
                <span id="rarityValue">--</span>
              </div>
              <div class="rarity-track"><span class="rarity-fill" id="rarityFill"></span></div>
            </div>
            <div class="result-text" id="resultText"></div>
            <div class="epilogue">
              <h3>后来发生了什么</h3>
              <p id="epilogueText"></p>
            </div>
            <div class="result-actions">
              <button class="btn primary" id="againBtn" type="button">再做一单</button>
              <a class="btn" href="../../../index.html">回到首页</a>
            </div>
          </div>
          <div class="result-aside">
            <h2>账本倾向</h2>
            <p id="reasonText"></p>
            <div class="score-list" id="scoreList"></div>
            <p class="hint">分数只用于判断路线，不代表经营建议。江湖生意，先活着再发财。</p>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast">本题只能选 1 项</div>

  <script src="../../../shared/quiz-core.js"></script>
  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
