<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#1f2b2c">
  <title>测试题实验</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="home-page">
    <div class="home-shell" aria-labelledby="home-title">
      <header class="home-header">
        <p class="eyebrow">故事测试实验室</p>
        <h1 id="home-title">选择一个测试</h1>
        <p class="lead">每个测试都会把选择藏进故事里。先选一个世界，再让结局自己露面。</p>
      </header>

      <section class="test-category" aria-labelledby="fantasy-title">
        <div class="category-head">
          <p class="eyebrow">Fantasy Kingdom</p>
          <h2 id="fantasy-title">奇幻王国</h2>
        </div>
        <div class="test-grid">
          <a class="test-card available" href="tests/fantasy-kingdom/dragon-warrior/index.html">
            <span class="test-status">可开始</span>
            <span class="test-title">龙与勇士</span>
            <span class="test-meta">十二道选择 · 十七种命运</span>
            <span class="test-copy">国王要你去边境屠龙，但任务书上的字，未必等于真相。</span>
          </a>

          <a class="test-card available" href="tests/fantasy-kingdom/dragon-investigation/index.html">
            <span class="test-status">可开始</span>
            <span class="test-title">屠龙任务调查版</span>
            <span class="test-meta">十二道选择 · 证据调查</span>
            <span class="test-copy">同一个屠龙任务，从证词、矿场和王室账本里查出另一种真相。</span>
          </a>

          <button class="test-card" type="button" aria-disabled="true">
            <span class="test-status">制作中</span>
            <span class="test-title">宫廷人格测试</span>
            <span class="test-meta">权谋场景 · 阵营倾向</span>
            <span class="test-copy">在宴会、密信和王座之间，看你更像顾问、骑士还是幕后推手。</span>
          </button>

          <a class="test-card available" href="tests/fantasy-kingdom/magic-career/index.html">
            <span class="test-status">可开始</span>
            <span class="test-title">魔法职业倾向</span>
            <span class="test-meta">十二道选择 · 二十种分流</span>
            <span class="test-copy">面对失控咒语、禁书和导师偏心，找到你最可能修成的魔法方向。</span>
          </a>

          <button class="test-card" type="button" aria-disabled="true">
            <span class="test-status">制作中</span>
            <span class="test-title">王国阵营测验</span>
            <span class="test-meta">政治寓言 · 价值排序</span>
            <span class="test-copy">秩序、自由、财富、传统和真相，总有一个会被你放到最前面。</span>
          </button>
        </div>
      </section>

      <section class="test-category" aria-labelledby="survival-title">
        <div class="category-head">
          <p class="eyebrow">Survival Decision</p>
          <h2 id="survival-title">生存决策</h2>
        </div>
        <div class="test-grid compact">
          <button class="test-card" type="button" aria-disabled="true">
            <span class="test-status">制作中</span>
            <span class="test-title">荒岛决策实验</span>
            <span class="test-meta">生存选择 · 团队角色</span>
            <span class="test-copy">资源有限、天气变坏、队友意见不一，你会先搭棚还是先定规则。</span>
          </button>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
