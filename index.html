<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#1f2b2c">
  <title>测试题实验</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="home-page">
    <div class="home-shell" aria-labelledby="home-title">
      <header class="home-header">
        <p class="eyebrow">故事测试实验室</p>
        <h1 id="home-title">选择一段故事</h1>
        <p class="lead">命运不会抢先落笔，它会沿着你的选择浮现。</p>
      </header>

      <section class="test-category" aria-labelledby="fantasy-title">
        <div class="category-head">
          <p class="eyebrow">Fantasy Kingdom</p>
          <h2 id="fantasy-title">奇幻王国</h2>
        </div>
        <div class="test-grid">
          <a class="test-card available" href="tests/fantasy-kingdom/dragon-investigation/index.html">
            <span class="test-status">12 题</span>
            <span class="test-title">屠龙任务调查版</span>
            <span class="test-meta">证据调查 · 王国疑案</span>
            <span class="test-copy">同一个屠龙任务，从证词、矿场和王室账本里查出另一种真相。</span>
          </a>

          <a class="test-card available" href="tests/fantasy-kingdom/magic-career/index.html">
            <span class="test-status">12 题</span>
            <span class="test-title">魔法职业倾向</span>
            <span class="test-meta">学院分流 · 魔法职业</span>
            <span class="test-copy">面对失控咒语、禁书和导师偏心，找到你最可能修成的魔法方向。</span>
          </a>
        </div>
      </section>

      <section class="test-category" aria-labelledby="jianghu-title">
        <div class="category-head">
          <p class="eyebrow">Jianghu</p>
          <h2 id="jianghu-title">江湖</h2>
        </div>
        <div class="test-grid compact">
          <a class="test-card available" href="tests/jianghu/merchant-profit/index.html">
            <span class="test-status">32 题</span>
            <span class="test-title">一本万利</span>
            <span class="test-meta">江湖 · 信息差 · 老板人格</span>
            <span class="test-copy">鲛人、藏宝阁、合欢宗、五毒教、御兽宗都在找路子。你谁都不是，但谁都找得到你。</span>
          </a>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
